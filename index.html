<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人记账</title>
  <style>
    :root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f5f7fb; min-height: 100vh; display: grid; place-items: center; padding: 12px; }
    .card { width: min(640px, 100%); background: #fff; border-radius: 14px; box-shadow: 0 8px 24px rgba(0,0,0,.08); padding: 20px; box-sizing: border-box; }
    h1 { margin: 0 0 16px; text-align: center; font-size: 1.3rem; color: #111827; }
    form { display: grid; gap: 12px; margin-bottom: 20px;}
    label { display: grid; gap: 6px; font-size: .94rem; color: #374151; font-weight: 500;}
    input, button { font: inherit; }
    input { padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; width: 100%; box-sizing: border-box; }
    input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    button { border: 0; border-radius: 10px; padding: 12px; color: #fff; background: #2563eb; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    .records-title { margin: 10px 0 8px; font-size: 1rem; font-weight: 600; color: #111827; display: flex; justify-content: space-between; align-items: center;}
    .records { max-height: 350px; overflow: auto; border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px; background: #f9fafb; }
    .record-item { padding: 10px; border-bottom: 1px dashed #d1d5db; font-size: .9rem; display: grid; gap: 4px; }
    .record-item:last-child { border-bottom: 0; }
    .record-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .record-name { font-weight: 600; color: #111827; font-size: 1rem;}
    .delete-btn { background: #ef4444; padding: 4px 10px; font-size: 0.8rem; border-radius: 6px; width: auto; }
    .delete-btn:hover { background: #dc2626; }
    #status { min-height: 22px; font-size: .85rem; color: #4b5563; text-align: center; margin-top: 8px; font-weight: 500;}
  </style>
</head>
<body>
  <main class="card">
    <h1>个人记账</h1>
    <form id="expense-form" autocomplete="off">
      <label>日期<input id="date" name="date" type="date" required /></label>
      <label>消费名称<input id="name" name="name" type="text" placeholder="例如：午餐" required /></label>
      <label>消费类型
        <input id="category" name="category" list="category-options" placeholder="选择或手动输入" required />
        <datalist id="category-options">
          <option value="食品"></option><option value="百货"></option><option value="健康"></option><option value="交通"></option>
        </datalist>
      </label>
      <label>消费金额<input id="amount" name="amount" type="number" inputmode="decimal" step="0.01" min="0" placeholder="请输入数字" required /></label>
      <button id="submit-btn" type="submit" disabled>正在连接云端...</button>
    </form>
    
    <div id="status" aria-live="polite"></div>

    <div class="records-title">最近记录 (云端同步)</div>
    <section id="records" class="records">
      <div style="text-align:center; padding: 20px; color: #6b7280;">正在拉取数据...</div>
    </section>
  </main>

  <script>
    const part1 = 'github_pa';
    const part2 = 't_11B5S';
    const part3 = '36XQ0IwzVKKG2MZ5E_JOE4o0rGzgBYQmTTtDAyp5DD56MRdzTCXtEm9fy6DcXDKUUQRMTE0RJ0Z3a';
    const GITHUB_TOKEN = part1 + part2 + part3; 
    
    const DEFAULT_GH = {
      owner: 'yang-lanlan',
      repo: '33',
      branch: 'main',
      path: 'data/expenses.json',
      csvPath: 'data/expenses.csv'
    };

    let currentRecords = [];

    const form = document.querySelector('#expense-form');
    const submitBtn = document.querySelector('#submit-btn');
    const dateInput = document.querySelector('#date');
    const recordsContainer = document.querySelector('#records');
    const statusEl = document.querySelector('#status');
    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;

    const utf8ToBase64 = (text) => btoa(unescape(encodeURIComponent(text)));
    const base64ToUtf8 = (base64) => {
        const binString = atob(base64);
        const bytes = new Uint8Array(binString.length);
        for (let i = 0; i < binString.length; i++) bytes[i] = binString.charCodeAt(i);
        return new TextDecoder('utf-8').decode(bytes);
    };

    const toCsv = (records) => {
      const header = 'date,name,category,amount';
      const rows = records.map((r) => {
        const safe = (v) => `"${String(v).replaceAll('"', '""')}"`;
        return [safe(r.date), safe(r.name), safe(r.category), safe(r.amount)].join(',');
      });
      return [header, ...rows].join('\n');
    };

    // 修复：强制带上时间戳打破缓存
    const fetchExistingSha = async (path) => {
      const url = `https://api.github.com/repos/${DEFAULT_GH.owner}/${DEFAULT_GH.repo}/contents/${path}?ref=${encodeURIComponent(DEFAULT_GH.branch)}&t=${Date.now()}`;
      const resp = await fetch(url, { 
        headers: { 
          Authorization: `Bearer ${GITHUB_TOKEN}`,
          'Cache-Control': 'no-cache, no-store, must-revalidate',
          'Pragma': 'no-cache'
        } 
      });
      if (resp.status === 404) return null;
      if (!resp.ok) throw new Error(`读取 SHA 失败`);
      const data = await resp.json();
      return data.sha;
    };

    const uploadContent = async (path, content, message) => {
      const sha = await fetchExistingSha(path);
      const url = `https://api.github.com/repos/${DEFAULT_GH.owner}/${DEFAULT_GH.repo}/contents/${path}`;
      const body = { message, content: utf8ToBase64(content), branch: DEFAULT_GH.branch, ...(sha ? { sha } : {}) };
      const resp = await fetch(url, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!resp.ok) throw new Error(`上传 ${path} 失败`);
    };

    const runUpload = async (loadingText = '正在同步到 GitHub...') => {
      try {
        statusEl.textContent = loadingText;
        statusEl.style.color = '#2563eb';
        submitBtn.disabled = true;

        const now = new Date().toISOString();
        const jsonPayload = JSON.stringify({ exportedAt: now, records: currentRecords }, null, 2);
        const csvPayload = toCsv(currentRecords);

        await uploadContent(DEFAULT_GH.path, jsonPayload, `chore: update data ${now}`);
        await uploadContent(DEFAULT_GH.csvPath, csvPayload, `chore: update csv ${now}`);
        
        statusEl.textContent = '✅ 数据已同步';
        statusEl.style.color = '#059669';
        setTimeout(() => { statusEl.textContent = ''; }, 3000);
      } catch (error) {
        statusEl.textContent = `❌ 同步失败: ${error.message}`;
        statusEl.style.color = '#ef4444';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '提交并同步';
      }
    };

    const renderRecords = () => {
      if (!currentRecords.length) {
        recordsContainer.innerHTML = '<div style="text-align:center; padding: 20px; color: #6b7280;">暂无记录。</div>';
        return;
      }
      recordsContainer.innerHTML = currentRecords.slice().reverse().map((item, reverseIndex) => {
        const originalIndex = currentRecords.length - 1 - reverseIndex;
        return `
          <article class="record-item">
            <div class="record-header">
              <span class="record-name">${item.name}</span>
              <button type="button" class="delete-btn" onclick="deleteRecord(${originalIndex})">删除</button>
            </div>
            <span>日期：${item.date} &nbsp;|&nbsp; 类型：${item.category}</span>
            <span style="color:#ef4444; font-weight:600;">金额：¥${Number(item.amount).toFixed(2)}</span>
          </article>
        `;
      }).join('');
    };

    window.deleteRecord = async (index) => {
      if (!confirm('确定要删除这条记录吗？')) return;
      currentRecords.splice(index, 1);
      renderRecords();
      await runUpload('正在删除并同步到 GitHub...');
    };

    // 修复：加入防缓存，拉取成功后才解锁提交按钮
    const loadData = async () => {
      try {
        statusEl.textContent = '正在拉取云端数据...';
        const url = `https://api.github.com/repos/${DEFAULT_GH.owner}/${DEFAULT_GH.repo}/contents/${DEFAULT_GH.path}?ref=${DEFAULT_GH.branch}&t=${Date.now()}`;
        const resp = await fetch(url, { 
          headers: { 
            Authorization: `Bearer ${GITHUB_TOKEN}`, 
            'Cache-Control': 'no-cache, no-store, must-revalidate',
            'Pragma': 'no-cache'
          } 
        });
        
        if (resp.status === 404) {
          currentRecords = [];
        } else if (!resp.ok) {
          throw new Error('拉取失败，可能是 Token 无效或过期');
        } else {
          const data = await resp.json();
          const content = base64ToUtf8(data.content);
          currentRecords = JSON.parse(content).records || [];
        }
        
        renderRecords();
        statusEl.textContent = '✅ 已连接到云端';
        statusEl.style.color = '#059669';
        setTimeout(() => { statusEl.textContent = ''; }, 2000);

        // 安全锁：只有这里执行成功了，才能点击提交！
        submitBtn.disabled = false;
        submitBtn.textContent = '提交并同步';

      } catch (e) {
        recordsContainer.innerHTML = `<div style="text-align:center; padding: 20px; color: #ef4444;">拉取失败，请检查 Token。</div>`;
        statusEl.textContent = '❌ 为防止覆盖数据，已禁用提交。';
        statusEl.style.color = '#ef4444';
        submitBtn.textContent = '连接失败';
      }
    };

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      const record = {
        date: formData.get('date'),
        name: formData.get('name'),
        category: formData.get('category'),
        amount: formData.get('amount')
      };
      
      currentRecords.push(record);
      renderRecords(); 
      form.reset();
      dateInput.value = today;
      form.querySelector('#name').focus();
      
      await runUpload('正在提交并同步到 GitHub...');
    });

    loadData();
  </script>
</body>
</html>
